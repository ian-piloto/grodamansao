<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Be+Vietnam+Pro:wght@300;400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "neon-pink": "#FF007F",
                        "neon-green": "#39FF14"
                    }
                }
            }
        }
    </script>
    <style>
        .neon-border { border-color: rgba(255, 0, 127, 0.3); box-shadow: 0 0 15px rgba(255, 0, 127, 0.1); transition: all 0.3s ease; }
        .neon-border:focus { border-color: rgba(255, 0, 127, 1); box-shadow: 0 0 20px rgba(255, 0, 127, 0.4); }
        .glass-card { background: rgba(20, 19, 19, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; }
        body { background-color: #0a0a0a; background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0a0a0a 100%); }
        
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-modal { animation: modalIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-white font-['Be_Vietnam_Pro']">
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-neon-pink/10 blur-[120px] rounded-full"></div>
        <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-neon-green/10 blur-[120px] rounded-full"></div>
    </div>

    <div class="w-full max-w-md z-10">
        <div class="text-center mb-10">
            <a href="index.html" class="text-3xl font-black italic tracking-tighter uppercase mb-2 inline-block">GORÓ DA MANSÃO</a>
            <p class="text-zinc-500 font-['Space_Grotesk'] uppercase tracking-[0.2em] text-xs">Junte-se à Elite do Entretenimento</p>
        </div>

        <div class="glass-card p-10 rounded-2xl shadow-2xl">
            <h1 class="text-2xl font-bold font-['Space_Grotesk'] mb-8 text-center uppercase tracking-tight">Criar sua Conta</h1>
            
            <form id="register-form" class="space-y-5">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-500 mb-2 ml-1">Nome de Cria</label>
                    <input type="text" id="name" required class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:outline-none transition-all neon-border" placeholder="SEU NOME COMPLETO">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-500 mb-2 ml-1">E-mail Digital</label>
                    <input type="email" id="email" required class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:outline-none transition-all neon-border" placeholder="nome@email.com">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-500 mb-2 ml-1">Chave de Acesso</label>
                    <input type="password" id="password" required class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:outline-none transition-all neon-border" placeholder="••••••••">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-500 mb-2 ml-1">Contato (WhatsApp)</label>
                    <input type="text" id="phone" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:outline-none transition-all neon-border" placeholder="(11) 99999-9999">
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full py-5 bg-white text-black font-black uppercase tracking-widest rounded-xl hover:shadow-[0_0_30px_rgba(255,255,255,0.3)] transition-all active:scale-[0.98]">
                        ENTRAR NO CLÃ
                    </button>
                </div>
            </form>

            <div class="mt-8 text-center">
                <p class="text-zinc-500 text-sm italic">Já é de casa? <a href="login.html" class="text-white underline hover:text-neon-pink transition-colors">Faça login</a></p>
            </div>
        </div>
    </div>

    <!-- Custom Modal -->
    <div id="msg-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[200] hidden items-center justify-center p-6">
        <div class="bg-surface-container border border-white/10 p-10 rounded-2xl max-w-sm w-full text-center shadow-2xl relative overflow-hidden bg-[#141313] animate-modal">
            <div id="modal-accent" class="absolute top-0 left-0 w-full h-1 bg-neon-pink"></div>
            <span id="modal-icon" class="material-symbols-outlined text-neon-pink text-5xl mb-4">check_circle</span>
            <h3 id="modal-title" class="font-headline-md text-xl uppercase mb-2">MESSAGEM</h3>
            <p id="modal-msg" class="text-zinc-500 text-sm mb-8">Descrição da mensagem aqui.</p>
            <button id="modal-btn" onclick="closeModal()" class="w-full py-4 bg-white text-black font-black uppercase tracking-widest hover:bg-zinc-200 transition-all">ENTENDIDO</button>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        let redirectUrl = null;

        window.showModal = function(title, message, isError = false, redirect = null) {
            const modal = document.getElementById('msg-modal');
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-msg').textContent = message;
            const icon = document.getElementById('modal-icon');
            const accent = document.getElementById('modal-accent');
            
            redirectUrl = redirect;
            
            if (isError) {
                icon.textContent = 'error';
                icon.className = 'material-symbols-outlined text-red-500 text-5xl mb-4';
                accent.className = 'absolute top-0 left-0 w-full h-1 bg-red-500';
            } else {
                icon.textContent = 'check_circle';
                icon.className = 'material-symbols-outlined text-neon-pink text-5xl mb-4';
                accent.className = 'absolute top-0 left-0 w-full h-1 bg-neon-pink';
            }
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        window.closeModal = function() {
            const modal = document.getElementById('msg-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            if (redirectUrl) window.location.href = redirectUrl;
        }

        document.getElementById('modal-btn').onclick = closeModal;

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const phone = document.getElementById('phone').value;

            try {
                // 1. Criar usuário no Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Atualizar perfil com o nome
                await updateProfile(user, { displayName: name });

                // 3. Salvar dados extras no Firestore
                await setDoc(doc(db, "users", user.uid), {
                    name: name,
                    email: email,
                    phone: phone,
                    createdAt: new Date().toISOString()
                });

                localStorage.setItem('user', JSON.stringify({ 
                    uid: user.uid, 
                    name: name, 
                    email: email 
                }));

                showModal('MARCHA NO PROGRESSO!', 'Cadastro realizado com sucesso. Bem-vindo à elite!', false, 'index.html');
            } catch (error) {
                let errorMsg = "Erro ao realizar cadastro.";
                if (error.code === 'auth/email-already-in-use') {
                    errorMsg = "Este e-mail já está em uso.";
                } else if (error.code === 'auth/weak-password') {
                    errorMsg = "A senha deve ter pelo menos 6 caracteres.";
                }
                showModal('OPS!', errorMsg, true);
            }
        });
    </script>

</body>
</html>
