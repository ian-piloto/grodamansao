<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Be+Vietnam+Pro:wght@300;400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "neon-pink": "#FF007F",
                        "neon-green": "#39FF14"
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card { background: rgba(20, 19, 19, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .neon-glow { text-shadow: 0 0 15px rgba(255, 0, 127, 0.5); }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white font-['Be_Vietnam_Pro'] p-6 md:p-12 min-h-screen">
    <div class="fixed inset-0 bg-[radial-gradient(circle_at_50%_0%,#1a1a1a_0%,#0a0a0a_100%)] pointer-events-none"></div>
    <div class="max-w-6xl mx-auto relative z-10">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
            <div>
                <h1 class="text-4xl font-black font-['Space_Grotesk'] italic tracking-tighter uppercase neon-glow">PEDIDOS REALIZADOS</h1>
                <p class="text-zinc-500 font-['Space_Grotesk'] uppercase tracking-[0.2em] text-xs">Gestão da Mansão • Logística</p>
            </div>
            <div class="flex gap-4">
                <a href="admin-produtos.html" class="flex items-center gap-3 border border-white/20 px-6 py-4 font-bold uppercase tracking-widest hover:bg-white/5 transition-all text-sm">PRODUTOS</a>
                <a href="admin-clientes.html" class="flex items-center gap-3 border border-white/20 px-6 py-4 font-bold uppercase tracking-widest hover:bg-white/5 transition-all text-sm">CLIENTES</a>
            </div>
        </header>

        <div class="grid grid-cols-1 gap-6" id="orders-list">
            <!-- Pedidos aqui -->
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        async function loadOrders() {
            const container = document.getElementById('orders-list');
            container.innerHTML = '<div class="text-center py-20 text-zinc-500 animate-pulse uppercase tracking-widest">Carregando Pedidos...</div>';
            
            try {
                const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                container.innerHTML = '';

                if (querySnapshot.empty) {
                    container.innerHTML = '<div class="py-20 text-center border-2 border-dashed border-white/5 rounded-2xl"><p class="text-zinc-600 font-black uppercase">NENHUM PEDIDO ENCONTRADO</p></div>';
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const order = docSnap.data();
                    const itemsHtml = order.items.map(item => `${item.quantity}x ${item.name}`).join(', ');
                    
                    container.innerHTML += `
                        <div class="glass-card p-8 rounded-2xl border-l-4 border-neon-pink flex flex-col md:flex-row justify-between gap-6">
                            <div class="flex-grow">
                                <div class="flex items-center gap-4 mb-2">
                                    <span class="text-xs font-black bg-zinc-800 px-3 py-1 rounded text-zinc-400 uppercase">#${docSnap.id.substring(0,8)}</span>
                                    <span class="text-xs font-black text-neon-green uppercase">${new Date(order.createdAt).toLocaleString('pt-BR')}</span>
                                </div>
                                <h3 class="text-xl font-bold uppercase mb-1">${order.customer_name}</h3>
                                <p class="text-zinc-400 text-sm mb-4">${order.customer_email}</p>
                                <div class="bg-black/20 p-4 rounded-xl border border-white/5">
                                    <p class="text-xs text-zinc-500 uppercase mb-2">ITENS DO PEDIDO</p>
                                    <p class="text-sm font-medium">${itemsHtml}</p>
                                </div>
                            </div>
                            <div class="md:text-right flex flex-col justify-between min-w-[200px]">
                                <div>
                                    <p class="text-xs text-zinc-500 uppercase">TOTAL COM FRETE</p>
                                    <p class="text-3xl font-black text-white">R$ ${order.total_price.toFixed(2)}</p>
                                </div>
                                <div class="text-xs text-zinc-500 mt-4">
                                    <p>${order.address.address}, ${order.address.number}</p>
                                    <p>${order.address.city} - ${order.address.uf}</p>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="text-center py-20 text-red-500 uppercase tracking-widest">Erro ao carregar pedidos.</div>';
            }
        }

        loadOrders();
    </script>
</body>
</html>
